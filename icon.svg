<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a5f8a"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <g opacity="0.3" stroke="#FFD700" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="80" x2="256" y2="120"/>
    <line x1="256" y1="392" x2="256" y2="432"/>
    <line x1="80" y1="256" x2="120" y2="256"/>
    <line x1="392" y1="256" x2="432" y2="256"/>
  </g>
  <circle cx="256" cy="256" r="140" fill="url(#sun)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="100" fill="#FFA500"/>
  <circle cx="256" cy="256" r="60" fill="#FFD700"/>
  <ellipse cx="220" cy="220" rx="40" ry="30" fill="#FFF" opacity="0.3"/>
</svg>